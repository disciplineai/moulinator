$schema: https://json-schema.org/draft/2020-12/schema
$id: https://moulinator.local/project-config.schema.yaml
title: ProjectDefinition
description: Declarative config for a single moulinator project.
type: object
additionalProperties: false
required:
  - slug
  - name
  - language
  - runner_image_digest
  - hermetic
  - timeout_seconds
  - harness_entrypoint
properties:
  slug:
    type: string
    pattern: "^[a-z][a-z0-9]*(-[a-z0-9]+)*$"
    minLength: 2
    maxLength: 64
    description: Kebab-case, must match <tests-repo>/<slug>/tests/.
  name:
    type: string
    minLength: 1
    maxLength: 128
  language:
    type: string
    enum: [c, cpp, python, bash, haskell]
  tests_path:
    type: string
    description: Path inside tests-repo. Defaults to "<slug>/tests".
    default: ""
  runner_image_digest:
    type: string
    pattern: "^sha256:[a-f0-9]{64}$"
    description: SHA256 digest only — no tags allowed.
  hermetic:
    type: boolean
    description: If true, runner egress is fully denied and egress_allowlist is ignored.
  egress_allowlist:
    type: array
    description: Only consulted when hermetic=false.
    items:
      type: object
      additionalProperties: false
      required: [host, ports]
      properties:
        host:
          type: string
          pattern: "^[a-z0-9][a-z0-9.-]*[a-z0-9]$"
        ports:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
            maximum: 65535
  timeout_seconds:
    type: integer
    minimum: 30
    maximum: 3600
  resource_limits:
    type: object
    additionalProperties: false
    properties:
      memory_mb:
        type: integer
        minimum: 64
        maximum: 8192
        default: 2048
      cpus:
        type: number
        minimum: 0.25
        maximum: 8
        default: 2
      pids:
        type: integer
        minimum: 32
        maximum: 4096
        default: 512
      disk_mb:
        type: integer
        minimum: 64
        maximum: 8192
        default: 1024
  harness_entrypoint:
    type: string
    description: Path relative to <tests-repo>/<slug>/ (e.g., "tests/harness.sh").
    pattern: "^[a-zA-Z0-9_./-]+\\.sh$"
